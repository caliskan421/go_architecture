openapi: 3.0.3
info:
  title: libra_management API
  version: 0.2.0
  description: |
    Faz 2 sonrası endpoint sözleşmesi. Cookie-based auth (jwt cookie).
    Önce /api/login → cookie set; sonra /api/authors* çağrıları aynı cookie ile.

servers:
  - url: http://localhost:3000
    description: local dev (PORT=3000)

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: "validation_error" }
            message: { type: string, example: "girdi doğrulanamadı" }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    UserResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        first_name: { type: string, example: "Ali" }
        last_name: { type: string, example: "Yılmaz" }
        email: { type: string, example: "ali@example.com" }
        role_id: { type: integer, example: 2 }
        role_title: { type: string, example: "user" }

    AuthorResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Yaşar Kemal" }
        description: { type: string, example: "Türk yazar." }

    RegisterRequest:
      type: object
      required: [first_name, last_name, email, password, password_confirm]
      properties:
        first_name: { type: string, example: "Ali" }
        last_name: { type: string, example: "Yılmaz" }
        email: { type: string, format: email, example: "ali@example.com" }
        password: { type: string, minLength: 8, example: "Sifre123!" }
        password_confirm: { type: string, example: "Sifre123!" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "ali@example.com" }
        password: { type: string, example: "Sifre123!" }

    CreateAuthorRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 2, maxLength: 191, example: "Yaşar Kemal" }
        description: { type: string, maxLength: 10000, example: "İnce Memed yazarı." }

    UpdateAuthorRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 2, maxLength: 191, example: "Yaşar Kemal" }
        description: { type: string, maxLength: 10000, example: "Türk romancı, hikâyeci." }

paths:
  /api/register:
    post:
      tags: [auth]
      summary: Yeni kullanıcı kaydı
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/login:
    post:
      tags: [auth]
      summary: Giriş — başarılıysa jwt cookie set eder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string, example: "jwt=eyJ...; HttpOnly; SameSite=Lax" }
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserResponse' }
        '401':
          description: Geçersiz kimlik bilgisi (user enumeration guard — generic mesaj)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/logout:
    post:
      tags: [auth]
      summary: Çıkış — jwt cookie temizler
      responses:
        '200':
          description: OK

  /api/authors:
    get:
      tags: [authors]
      summary: Tüm author'ları listele
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AuthorResponse' }
        '401': { description: Auth yok / cookie geçersiz }

    post:
      tags: [authors]
      summary: Yeni author oluştur
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAuthorRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthorResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Auth yok }
        '409':
          description: Aynı isimde author zaten var (uniqueIndex çakışması)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/authors/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, minimum: 1, example: 1 }

    get:
      tags: [authors]
      summary: ID ile author getir
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthorResponse' }
        '400': { description: Geçersiz id }
        '401': { description: Auth yok }
        '404': { description: Author bulunamadı }

    put:
      tags: [authors]
      summary: Author güncelle (PUT — full replace)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAuthorRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthorResponse' }
        '400': { description: Validation error / geçersiz id }
        '401': { description: Auth yok }
        '404': { description: Author bulunamadı }
        '409': { description: İsim çakışması }

    delete:
      tags: [authors]
      summary: Author sil (soft-delete)
      security: [{ cookieAuth: [] }]
      responses:
        '204': { description: No Content }
        '400': { description: Geçersiz id }
        '401': { description: Auth yok }
        '404': { description: Author bulunamadı }
